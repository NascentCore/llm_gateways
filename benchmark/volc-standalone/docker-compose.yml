# 火山单机：NewAPI（对齐官方 docker-compose）+ PostgreSQL + Redis + 内网 Mock + Nginx
# 官方基准: https://github.com/QuantumNous/new-api/blob/main/docker-compose.yml
# 官方说明: https://github.com/QuantumNous/new-api-docs/blob/main/docs/en/installation/docker-compose-yml.md
#
# 与官方差异：增加 mock（仅容器内 8000）、nginx（对外 80/443）、new-api 不映射宿主机 3000；
# 增加 FRONTEND_BASE_URL；资源使用 mem_limit/cpus（Compose 单机可生效）。
#
# 使用前：cp .env.example .env 并填写 DOMAIN / LETSENCRYPT_EMAIL / POSTGRES_PASSWORD
# 启动：./scripts/bootstrap.sh && docker compose up -d --build
# TLS：./scripts/issue-cert.sh
#
# 变量：在项目目录提供 .env（见 .env.example），Compose 会自动加载用于替换 ${DOMAIN} 等。

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    expose:
      - "3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:${POSTGRES_PASSWORD:-123456}@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - FRONTEND_BASE_URL=https://${DOMAIN}
    depends_on:
      - redis
      - postgres
      - mock
    networks:
      - new-api-network
    mem_limit: 3g
    cpus: 1.75
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  mock:
    build:
      context: ../mock
      dockerfile: Dockerfile
    image: llm-gateways-mock:volc
    container_name: mock-openai
    restart: always
    environment:
      - MOCK_OUTPUT_TOKENS=${MOCK_OUTPUT_TOKENS:-64}
      - MOCK_MAX_COMPLETION_TOKENS=${MOCK_MAX_COMPLETION_TOKENS:-262144}
    expose:
      - "8000"
    networks:
      - new-api-network
    mem_limit: 512m
    cpus: 0.35

  redis:
    image: redis:latest
    container_name: newapi-redis
    restart: always
    networks:
      - new-api-network
    mem_limit: 768m
    cpus: 0.4

  postgres:
    image: postgres:15
    container_name: newapi-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
    mem_limit: 2g
    cpus: 1.0

  nginx:
    image: nginx:alpine
    container_name: benchmark-nginx
    restart: always
    depends_on:
      - new-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - new-api-network
    mem_limit: 128m
    cpus: 0.25

volumes:
  pg_data:

networks:
  new-api-network:
    driver: bridge
